<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background outer glow gradient -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>

    <!-- Main Card Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Primary Cyan-to-Emerald Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#0db7a6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Sparkle/Bright Cyan Gradient -->
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Checkmark Badge Gradient -->
    <linearGradient id="checkBadgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Filter for high-end shadows and glow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Glow Background -->
  <circle cx="64" cy="64" r="64" fill="url(#outerGlow)" />

  <!-- Outer circular border frame -->
  <circle cx="64" cy="64" r="56" fill="url(#bgGrad)" stroke="url(#primaryGrad)" stroke-width="3" filter="url(#shadow)"/>

  <!-- Document / Page Shape with folded corner and rounded outline -->
  <g filter="url(#shadow)">
    <!-- Main page body -->
    <path d="M38 24h36l22 22v52c0 5.5-4.5 10-10 10H48c-5.5 0-10-4.5-10-10V34c0-5.5 4.5-10 10-10z" fill="#1e293b" stroke="url(#primaryGrad)" stroke-width="2.5"/>
    
    <!-- Folded page corner with gradient overlay -->
    <path d="M74 24v16c0 3.3 2.7 6 6 6h16L74 24z" fill="#0f172a" stroke="url(#primaryGrad)" stroke-width="1.5"/>
  </g>

  <!-- Text lines (Resume Sections) with different colors indicating grading -->
  <!-- Name section -->
  <rect x="44" y="44" width="22" height="5" rx="2.5" fill="#64748b" />
  
  <!-- Content sections -->
  <rect x="44" y="56" width="48" height="4" rx="2" fill="#475569" />
  
  <!-- Colored score bars on resume, indicating "Optimized" -->
  <rect x="44" y="66" width="36" height="4" rx="2" fill="url(#primaryGrad)" />
  <rect x="44" y="76" width="42" height="4" rx="2" fill="url(#primaryGrad)" />
  
  <!-- Muted bottom bar -->
  <rect x="44" y="86" width="24" height="4" rx="2" fill="#475569" />

  <!-- Premium Sparkling Magic AI Stars -->
  <path d="M98 22l1.5 3.5 3.5 1.5-3.5 1.5-1.5 3.5-1.5-3.5-3.5-1.5 3.5-1.5z" fill="url(#sparkleGrad)" filter="url(#neonGlow)"/>
  <path d="M84 12l1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z" fill="url(#sparkleGrad)"/>
  <path d="M104 38l1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z" fill="url(#sparkleGrad)"/>

  <!-- Glowing checkmark badge on bottom right -->
  <g filter="url(#shadow)">
    <!-- Outer white border for separation -->
    <circle cx="94" cy="94" r="20" fill="#020617" />
    <circle cx="94" cy="94" r="17" fill="url(#checkBadgeGrad)" stroke="url(#primaryGrad)" stroke-width="1" />
    <!-- Thick Checkmark -->
    <path d="M86 94l5.5 5.5 11-11" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>